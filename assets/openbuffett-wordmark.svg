<svg width="760" height="220" viewBox="0 0 760 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">OpenBuffett</title>
  <desc id="desc">OpenBuffett irregular acid-bubble wordmark in the project's mint-green theme.</desc>
  <defs>
    <linearGradient id="bubbleFill" x1="112" y1="40" x2="606" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6fff7" />
      <stop offset="0.42" stop-color="#d8ffe0" />
      <stop offset="1" stop-color="#b8f5c7" />
    </linearGradient>
    <linearGradient id="bubbleHighlight" x1="194" y1="60" x2="532" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="softShadow" x="28" y="18" width="708" height="176" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dx="0" dy="10" />
      <feGaussianBlur stdDeviation="8" />
      <feColorMatrix type="matrix" values="0 0 0 0 0.0705882 0 0 0 0 0.196078 0 0 0 0 0.145098 0 0 0 0.42 0" />
    </filter>
    <filter id="acidWarp" x="44" y="16" width="672" height="188" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.016" numOctaves="2" seed="11" result="noise" />
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

